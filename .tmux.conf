# prefixキーをC-qに変更
set -g prefix C-q

# C-bのキーバインドを解除
unbind C-b

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# | でペインを縦分割する
bind | split-window -h

# - でペインを横分割する
bind - split-window -v

# 番号基準値を変更
set-option -g base-index 1

# Use vim keybindings in copy mode
setw -g mode-keys vi

# コピーモードでC-h/C-lで行頭/行末に移動（vimと同じ）
bind -T copy-mode-vi C-h send -X back-to-indentation
bind -T copy-mode-vi C-l send -X end-of-line

# v: 選択開始 / V: 行選択 / C-v: 矩形選択
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# y: ヤンク（copyモードに留まる）
bind -T copy-mode-vi y send -X copy-pipe "pbcopy" \; send -X clear-selection

# Y: 行ヤンク（Vim互換）
bind -T copy-mode-vi Y send -X select-line \; send -X copy-pipe "pbcopy" \; send -X clear-selection

# viw: ワード選択 / vii は不要なので i → w でワード選択
bind -T copy-mode-vi i switch-client -T vi-text-object
bind -T vi-text-object w send -X select-word
bind -T vi-text-object Escape send -X cancel

# 256色端末を使用する
set-option -g default-terminal tmux-256color
set -ga terminal-features ',xterm-ghostty:clipboard:strikethrough:usstyle:RGB:ccolour:cstyle'
set -ga terminal-features ',xterm-256color:clipboard:strikethrough:usstyle:RGB:ccolour:cstyle'

## set status bar
set -g status-style bg="black"
set -g status-style fg="white"

## set unsynchronized panes
bind E setw synchronize-panes off \; set -g status-style bg="black",fg="white" \; display-message "Panes un-synchronized."

# set synchronize panes
bind e setw synchronize-panes on \; set -g status-style bg="red",fg="white" \; display-message "Panes synchronized."

## highlight active window
setw -g window-status-current-style bg="black"
setw -g window-status-current-style fg="blue"

## highlight activity in status bar
setw -g window-status-activity-style bg="yellow"
setw -g window-status-activity-style fg="black"

## pane border and colors
set -g pane-active-border-style bg="black"
set -g pane-active-border-style fg="blue"
set -g pane-border-style bg="black"
set -g pane-border-style fg="white"

# 拡張キー（修飾キー付きキー入力）を有効化
set -g extended-keys always
set -ga terminal-features ',xterm-ghostty:extkeys'
set -g allow-passthrough on

# number of history
set-option -g history-limit 100000

# show directory name as window title
set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'
