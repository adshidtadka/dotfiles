# prefixキーをC-qに変更
set -g prefix C-q

# C-bのキーバインドを解除
unbind C-b

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペインの幅を均等にする
bind = select-layout -E \; display-message "Pane sizes balanced."
set -s command-alias[100] balance-panes='select-layout -E'

# | でペインを縦分割する（カレントディレクトリを引き継ぐ）
bind | split-window -h -c "#{pane_current_path}"

# - でペインを横分割する（カレントディレクトリを引き継ぐ）
bind - split-window -v -c "#{pane_current_path}"

# デフォルトの % と " にもカレントディレクトリを引き継ぐ
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# 新しいウィンドウを開く時もカレントディレクトリを引き継ぐ
bind c new-window -c "#{pane_current_path}"

# 番号基準値を変更
set-option -g base-index 1

# Use vim keybindings in copy mode
setw -g mode-keys vi

# コピーモードでC-h/C-lで行頭/行末に移動（vimと同じ）
bind -T copy-mode-vi C-h send -X back-to-indentation
bind -T copy-mode-vi C-l send -X end-of-line

# v: 選択開始 / V: 行選択 / C-v: 矩形選択
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# y: 選択中ならヤンク、未選択なら y→i→w (yiw) / y→y (yy) を待つ
bind -T copy-mode-vi y if-shell -F "#{selection_present}" \
  "send -X copy-pipe 'pbcopy' ; send -X clear-selection" \
  "switch-client -T yank-pending"
bind -T yank-pending i switch-client -T yank-text-object
bind -T yank-pending y send -X select-line \; send -X copy-pipe "pbcopy" \; send -X clear-selection
bind -T yank-pending Escape if-shell true ''
bind -T yank-text-object w send -X select-word \; send -X copy-pipe "pbcopy" \; send -X clear-selection
bind -T yank-text-object W send -X previous-space \; send -X begin-selection \; send -X next-space-end \; send -X copy-pipe "pbcopy" \; send -X clear-selection
bind -T yank-text-object '"' send -X search-backward-text '"' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text '"' \; send -X cursor-left \; send -X copy-pipe "pbcopy" \; send -X clear-selection
bind -T yank-text-object Escape if-shell true ''

# Y: 行ヤンク（Vim互換）
bind -T copy-mode-vi Y send -X select-line \; send -X copy-pipe "pbcopy" \; send -X clear-selection

# v→i→w でワード選択（ヤンクせず選択のみ）
bind -T copy-mode-vi i switch-client -T vi-text-object
bind -T vi-text-object w send -X select-word
bind -T vi-text-object W send -X previous-space \; send -X begin-selection \; send -X next-space-end
bind -T vi-text-object '"' send -X search-backward-text '"' \; send -X cursor-right \; send -X begin-selection \; send -X search-forward-text '"' \; send -X cursor-left
bind -T vi-text-object Escape if-shell true ''

# 256色端末を使用する
set-option -g default-terminal tmux-256color
set -ga terminal-features ',xterm-ghostty:clipboard:strikethrough:usstyle:RGB:ccolour:cstyle'
set -ga terminal-features ',xterm-256color:clipboard:strikethrough:usstyle:RGB:ccolour:cstyle'

## set status bar
set -g status-style bg="default",fg="white"

## set unsynchronized panes
bind E setw synchronize-panes off \; set -g status-style bg="default",fg="white" \; display-message "Panes un-synchronized."

# set synchronize panes
bind e setw synchronize-panes on \; set -g status-style bg="red",fg="white" \; display-message "Panes synchronized."

## highlight active window
setw -g window-status-current-style bg="default",fg="blue"

## highlight activity in status bar
setw -g window-status-activity-style bg="yellow",fg="black"

## pane border and colors
set -g pane-active-border-style bg="default",fg="blue"
set -g pane-border-style bg="default",fg="white"

# 拡張キー（修飾キー付きキー入力）を有効化
set -g extended-keys always
set -ga terminal-features ',xterm-ghostty:extkeys'
set -g allow-passthrough on

# number of history
set-option -g history-limit 100000

# show directory name as window title
set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'
